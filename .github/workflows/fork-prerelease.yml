name: Fork Prerelease

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Prerelease tag, for example v0.1.0-alpha.1"
        required: true
        type: string
      release_name:
        description: "Release title. Defaults to Quill <tag> (Unsigned Prerelease)."
        required: false
        type: string
      release_notes:
        description: "Optional release notes appended below the unsigned build warning."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: fork-prerelease-${{ github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve prerelease metadata
        id: metadata
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          TAG="$INPUT_TAG"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta|rc)\.[0-9]+$ ]]; then
            echo "Unsigned fork prerelease tags must look like v0.1.0-alpha.1, v0.1.0-beta.1, or v0.1.0-rc.1." >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          BASE_VERSION="${VERSION%%-*}"
          RELEASE_NAME="$INPUT_RELEASE_NAME"
          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="Quill $TAG (Unsigned Prerelease)"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

      - name: Stamp app version
        run: |
          plutil -replace CFBundleShortVersionString -string "${{ steps.metadata.outputs.base_version }}" Info.plist
          plutil -replace CFBundleVersion -string "${{ github.run_number }}" Info.plist
          plutil -replace QuillBuildTag -string "${{ steps.metadata.outputs.tag }}" Info.plist

      - name: Install build tools
        run: brew install create-dmg fileicon

      - name: Build unsigned universal DMG
        run: make dmg ARCH=universal APP_NAME=Quill BUNDLE_ID=com.woosublee.quill CODESIGN_IDENTITY=-

      - name: Save unsigned DMG
        run: mv build/Quill.dmg Quill-Unsigned.dmg

      - name: Build release notes
        id: release_notes
        env:
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          {
            echo "body<<EOF"
            echo "## Unsigned fork prerelease"
            echo
            echo "This is a prerelease build from the woosublee/freeflow fork."
            echo
            echo "### Important installation note"
            echo
            echo "- This DMG is not Apple-notarized."
            echo "- macOS Gatekeeper may block the app on first launch."
            echo "- If you choose to run it, open it only if you trust this fork build."
            echo
            echo "### Download"
            echo
            echo "**Quill-Unsigned.dmg** — Universal build for Apple Silicon and Intel Macs."
            if [ -n "$RELEASE_NOTES" ]; then
              echo
              echo "### Notes"
              echo
              printf '%s\n' "$RELEASE_NOTES"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update prerelease
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.metadata.outputs.release_name }}
          body: ${{ steps.release_notes.outputs.body }}
          generate_release_notes: false
          make_latest: false
          prerelease: true
          files: |
            Quill-Unsigned.dmg
